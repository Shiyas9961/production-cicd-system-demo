name: CI Build and Test

on:
  push:
    paths:
      - '02-ci-build-test/**'
    branches:
      - dev
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 02-ci-build-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Images
        run: docker build -t ci-cd-prod .

      - name: Run container
        run: docker run -d -p 5000:5000 --name prod-container ci-cd-prod

      - name: Wait for App
        run: sleep 5

      - name: Wait for App (Fail is not ready)
        run: |
          for i in {1..10}; do
            if curl -fs http://localhost:5000; then
              echo "App is up!"
              exit 0
            fi

            echo "Wait for app..."
            sleep 2
          done

          echo "App failed to start"
          docker logs 
          exit 1

      - name: Real health check
        run: curl -f http://localhost:5000

      - name: Cleanup containers
        if: always()
        run: docker stop prod-container && docker rm prod-container
        
