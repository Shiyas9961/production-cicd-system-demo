name: CI Pipeline - Deployment Failure

on:
  push:
    paths:
      - '04-deployment-success-but-app-down/**'
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: 04-deployment-success-but-app-down

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t deploy-app .

      - name: Run Image
        run: docker run -d --name prod-container -p 5000:5000 deploy-app

      - name: Show logs
        run: docker logs prod-container

      - name: Wait Fir app (Fail if not ready)
        run: |
          for i in {1..10};do
            if curl -fs http://localhost:5000; then
              echo "Wait is App"
              exit 0

            fi
              echo "Wait for app..."
              sleep 2
            done

          echo "App fail to start"
          exit 1

      - name: Real Health Check
        run: curl -f http://localhost:5000
